<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>会議文字起こし・議事録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#111;--surface:#1e1e1e;--surface2:#2a2a2a;--border:#333;
    --text:#e8e8e8;--text2:#999;--text3:#555;
    --accent:#3b5bdb;--accent2:#2f4bc7;--green:#4ade80;--red:#f87171;
  }
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:2rem 1rem;}
  .container{max-width:760px;margin:0 auto;}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:2rem;}
  .logo{width:44px;height:44px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .header h1{font-size:18px;font-weight:600;}
  .header p{font-size:12px;color:var(--text2);margin-top:3px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
  input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);width:100%;outline:none;font-family:inherit;}
  input:focus,select:focus{border-color:#555;}
  input::placeholder{color:var(--text3);}
  .status{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text2);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:8px;transition:background 0.3s;}
  .dot.rec{background:var(--green);animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
  .timer{font-variant-numeric:tabular-nums;font-size:13px;font-weight:500;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  button{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;transition:all 0.15s;}
  button:hover{background:#333;}
  button:active{transform:scale(0.97);}
  .btn-primary{background:var(--text);color:#111;border-color:var(--text);}
  .btn-primary:hover{background:#ccc;color:#111;}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-accent:hover{background:var(--accent2);}
  .btn-danger{color:var(--red);border-color:var(--border);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .card-title{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;}
  .transcript-body{min-height:120px;max-height:300px;overflow-y:auto;font-size:14px;line-height:1.9;}
  .empty{color:var(--text3);font-size:14px;padding:1rem 0;}
  .entry{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .entry-time{font-size:11px;color:var(--text3);margin-bottom:3px;}
  .entry-text{color:var(--text);font-size:14px;}
  .minutes-body{background:#0d0d0d;border-radius:8px;padding:16px;font-size:13px;line-height:1.9;color:var(--text2);min-height:100px;white-space:pre-wrap;max-height:300px;overflow-y:auto;}
  .dl-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .section-divider{height:1px;background:var(--border);margin:14px 0;}
  .perm-notice{background:#1a1000;border:1px solid #443300;border-radius:10px;padding:12px 16px;font-size:13px;color:#ffb347;display:none;margin-bottom:14px;}
  .perm-notice.show{display:flex;align-items:flex-start;gap:10px;}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">🎙️</div>
    <div>
      <h1>会議文字起こし &amp; 議事録</h1>
      <p>ブラウザ内音声認識 × HTML議事録生成</p>
    </div>
  </div>

  <div class="perm-notice" id="perm-notice">
    <span>⚠️</span>
    <span id="perm-msg">マイクへのアクセスを許可してください。ブラウザのアドレスバー横の🔒アイコンからマイクを「許可」に設定してください。</span>
  </div>

  <div class="card">
    <div class="field-row">
      <div>
        <label>会議名</label>
        <input type="text" id="mtitle" placeholder="例: 週次定例会議">
      </div>
      <div>
        <label>参加者</label>
        <input type="text" id="mparts" placeholder="例: 田中, 鈴木, 佐藤">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="status" id="status-bar">
      <span><span class="dot" id="sdot"></span><span id="smsg">準備完了。「録音開始」を押してください</span></span>
      <span class="timer" id="timer">00:00</span>
    </div>
    <div style="margin-top:12px;" class="btn-row">
      <button class="btn-primary" id="rec-btn" onclick="toggleRec()">▶ 録音開始</button>
      <button onclick="stopRec()">■ 停止</button>
      <button class="btn-accent" onclick="genMinutes()">📄 議事録を生成</button>
      <button class="btn-danger" onclick="clearAll()">🗑 クリア</button>
    </div>
    <div style="margin-top:12px;">
      <label>言語</label>
      <select id="lang-sel">
        <option value="ja-JP">JP 日本語</option>
        <option value="en-US">EN English</option>
        <option value="zh-CN">CN 中文</option>
        <option value="ko-KR">KR 한국어</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="card-title">📝 文字起こし</span>
      <button class="btn-sm" onclick="copyTranscript()">コピー</button>
    </div>
    <div class="transcript-body" id="tbody">
      <div class="empty">ここに音声が文字起こしされます...</div>
    </div>
  </div>

  <div class="card" id="minutes-card" style="display:none;">
    <div class="card-head">
      <span class="card-title">📋 議事録プレビュー</span>
    </div>
    <div class="minutes-body" id="mpreview"></div>
    <div class="dl-row">
      <button class="btn-accent" onclick="downloadHTML()">⬇ HTMLでダウンロード</button>
      <button onclick="copyHTML()">HTMLをコピー</button>
    </div>
  </div>

</div>

<script>
let recording=false,entries=[],timerInt=null,elapsed=0,recognition=null,mHTML='';
const pad=n=>String(n).padStart(2,'0');
const $=id=>document.getElementById(id);

function toggleRec(){if(!recording)startRec();else pauseRec();}

function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    showError('このブラウザは音声認識に対応していません。Chromeをお使いください。');
    return;
  }
  recording=true;
  $('sdot').classList.add('rec');
  $('smsg').textContent='録音中...';
  $('rec-btn').textContent='⏸ 一時停止';
  $('perm-notice').classList.remove('show');
  timerInt=setInterval(()=>{elapsed++;$('timer').textContent=pad(Math.floor(elapsed/60))+':'+pad(elapsed%60);},1000);

  recognition=new SR();
  recognition.lang=$('lang-sel').value;
  recognition.continuous=true;
  recognition.interimResults=true;

  let interim='';
  recognition.onresult=e=>{
    interim='';
    let final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final.trim()){
      entries.push({text:final.trim(),time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
      render();
    }
    $('smsg').textContent=interim?'認識中: '+interim:'録音中...';
  };

  recognition.onend=()=>{
    if(recording) recognition.start();
  };

  recognition.onerror=ev=>{
    if(ev.error==='not-allowed'||ev.error==='denied'){
      showError('マイクへのアクセスが拒否されました。ブラウザのアドレスバー横🔒からマイクを「許可」に変更してください。');
    } else if(ev.error==='no-speech'){
      // 無音は無視
    } else {
      showError('エラー: '+ev.error);
    }
  };

  recognition.start();
}

function showError(msg){
  recording=false;
  clearInterval(timerInt);
  $('sdot').classList.remove('rec');
  $('rec-btn').textContent='▶ 録音開始';
  $('perm-notice').classList.add('show');
  $('perm-msg').textContent=msg;
  $('smsg').textContent='エラーが発生しました';
}

function pauseRec(){
  recording=false;
  clearInterval(timerInt);
  if(recognition) recognition.stop();
  $('sdot').classList.remove('rec');
  $('smsg').textContent='一時停止中';
  $('rec-btn').textContent='▶ 録音再開';
}

function stopRec(){
  recording=false;
  clearInterval(timerInt);
  if(recognition) recognition.stop();
  $('sdot').classList.remove('rec');
  $('smsg').textContent='録音停止。「議事録を生成」で整理できます。';
  $('rec-btn').textContent='▶ 録音開始';
}

function render(){
  const b=$('tbody');
  if(!entries.length){b.innerHTML='<div class="empty">ここに音声が文字起こしされます...</div>';return;}
  b.innerHTML=entries.map(e=>`<div class="entry"><div class="entry-time">${e.time}</div><div class="entry-text">${e.text}</div></div>`).join('');
  b.scrollTop=b.scrollHeight;
}

function clearAll(){
  if(!confirm('文字起こしと議事録をすべてクリアしますか？')) return;
  entries=[];elapsed=0;recording=false;mHTML='';
  clearInterval(timerInt);
  if(recognition) recognition.stop();
  $('timer').textContent='00:00';
  $('sdot').classList.remove('rec');
  $('smsg').textContent='準備完了。「録音開始」を押してください';
  $('rec-btn').textContent='▶ 録音開始';
  $('minutes-card').style.display='none';
  $('perm-notice').classList.remove('show');
  render();
}

function copyTranscript(){
  const text=entries.map(e=>e.time+'\t'+e.text).join('\n')||'データなし';
  navigator.clipboard.writeText(text).then(()=>flash(event.target,'コピー完了'));
}

function genMinutes(){
  const title=$('mtitle').value||'会議';
  const parts=$('mparts').value||'—';
  const date=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const now=new Date().toLocaleString('ja-JP');
  const src=entries.length?entries:[{time:'—',text:'（文字起こしデータなし）'}];
  const rows=src.map(e=>`<tr><td style="padding:8px 14px;color:#777;white-space:nowrap;font-size:13px;vertical-align:top;border-bottom:1px solid #f0f0f0;">${e.time}</td><td style="padding:8px 14px;font-size:14px;border-bottom:1px solid #f0f0f0;line-height:1.7;">${e.text}</td></tr>`).join('');

  mHTML=`<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>議事録 - ${title}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap');
  body{font-family:'Noto Sans JP',sans-serif;background:#f7f7f7;margin:0;padding:2rem 1rem;color:#222;}
  .page{max-width:800px;margin:0 auto;background:#fff;border-radius:14px;padding:2.5rem;box-shadow:0 2px 20px rgba(0,0,0,0.07);}
  .top{border-bottom:2px solid #111;padding-bottom:1.2rem;margin-bottom:1.5rem;}
  h1{font-size:22px;font-weight:600;margin-bottom:6px;}
  .meta{font-size:13px;color:#777;}
  .meta span{margin-right:1.5rem;}
  h2{font-size:14px;font-weight:600;color:#333;border-left:3px solid #3b5bdb;padding-left:10px;margin:1.5rem 0 0.75rem;text-transform:uppercase;letter-spacing:0.05em;}
  table{width:100%;border-collapse:collapse;}
  tr:last-child td{border-bottom:none !important;}
  .footer{margin-top:2rem;padding-top:1rem;border-top:1px solid #eee;font-size:11px;color:#bbb;text-align:right;}
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <h1>${title}</h1>
    <div class="meta">
      <span>📅 ${date}</span>
      <span>👥 ${parts}</span>
    </div>
  </div>
  <h2>文字起こし</h2>
  <table>${rows}</table>
  <div class="footer">生成日時: ${now}</div>
</div>
</body>
</html>`;

  $('mpreview').textContent=`📋 ${title}\n📅 ${date}\n👥 ${parts}\n${'─'.repeat(36)}\n`+src.map(e=>`${e.time}  ${e.text}`).join('\n');
  $('minutes-card').style.display='block';
  $('minutes-card').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function downloadHTML(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([mHTML],{type:'text/html;charset=utf-8'}));
  a.download=($('mtitle').value||'議事録')+'_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.html';
  a.click();
}

function copyHTML(){
  navigator.clipboard.writeText(mHTML).then(()=>flash(event.target,'コピー完了'));
}

function flash(btn,msg){
  const o=btn.textContent;btn.textContent=msg;setTimeout(()=>btn.textContent=o,1500);
}
</script>
</body>
</html>
